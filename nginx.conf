server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Security response headers (defense in depth) ──────────────────────
    # OWASP Secure Headers project preporuke. Spring isto setuje vecinu ovih
    # za direktan pristup BE-u (8080), nginx ih dodaje za FE (3000) + sve
    # /api/ proxy-ovane odgovore. Browser-i koji vide ove header-e blokiraju
    # XSS, clickjacking, MIME sniffing, FLoC tracking, itd.
    #
    # Note: `add_header` u nginx-u se primenjuje samo na 200/201/204/301/302/304/307/308
    # po default-u. `always` parametar primenjuje i na error response-ove (4xx/5xx)
    # — kriticno jer napadac cesto trazi da provocira 500 da pobegne header-ima.

    # X-Content-Type-Options: nosniff — sprecava browser MIME-type sniffing.
    # Bez ovog, IE/old Chrome moze da interpretira text/plain kao text/html
    # i izvrsi JS koji je upload-ovan kao "image".
    add_header X-Content-Type-Options "nosniff" always;

    # X-Frame-Options: DENY — sprecava embed-ovanje stranice u <iframe> sa drugog
    # origin-a (clickjacking protekcija). Modern alternativa je CSP frame-ancestors,
    # ali oba postavljamo radi support-a starih browsera.
    add_header X-Frame-Options "DENY" always;

    # Strict-Transport-Security — preforce HTTPS-a u browser-u za 1 godinu, ukljucujuci
    # subdomene. Aktivira se SAMO kad je app servirana preko HTTPS-a (browser ignorise
    # HSTS preko HTTP-a). U dev ide preko 80 pa se preporuka ignorise — bezopasno.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Referrer-Policy: no-referrer — pri kliku na external link, browser ne salje
    # nikakav Referer header. Sprecava sliku gde ostali sajt-ovi vide internal URL-ove.
    add_header Referrer-Policy "no-referrer" always;

    # Permissions-Policy — opt-out iz feature-a koje nas frontend ne koristi.
    # Geolocation/microphone/camera/payment/USB su sve disabled za sve origin-e.
    # Ako kasnije implementiramo kameru za QR scan, dodaj 'self'.
    # Geolocation i microphone DOZVOLJENI za sami app (self) — geolocation za
    # "Najblize lokacije" na /branches mapi (Leaflet), microphone za Arbitro
    # voice input (Web Speech API + SpeechRecognition). Camera/payment/USB ostaju
    # disabled. interest-cohort opt-out (FLoC).
    add_header Permissions-Policy "geolocation=(self), microphone=(self), camera=(), payment=(), usb=(), interest-cohort=()" always;

    # Content-Security-Policy — najjacha XSS odbrana. Restriktivan ali kompatibilan sa
    # nasim app-om:
    #   - default-src 'self' — sve dozvoljeno samo iz istog origin-a
    #   - script-src 'self' 'unsafe-inline' — Vite bundling generise inline scripts
    #     u index.html (preload tags), 'unsafe-inline' je trade-off; bez toga login
    #     stranica ne radi. Refactor ka nonce-baziranom CSP za sledeci sprint.
    #   - style-src 'self' 'unsafe-inline' — Tailwind 4 generise inline @style preko
    #     CSS variables; 'unsafe-inline' je nuzno za shadcn/ui komponente.
    #   - img-src 'self' data: blob: https: — data URI za FavIcon, blob za PDF preview,
    #     https za external sliku (npr. user avatar).
    #   - connect-src 'self' http://localhost:8080 http://localhost:11434 — XHR samo
    #     ka self origin-u i Arbitro Ollama LLM endpoint-u (lokalno dev).
    #   - frame-ancestors 'none' — apsolutna zabrana embed-ovanja (X-Frame-Options
    #     ekvivalent u CSP-u).
    #   - object-src 'none' — bez plugins (Flash, Java applets) — wide attack vector.
    #   - base-uri 'self' — sprecava napadace da injektuju <base href> i menjaju
    #     resolve-ovanje relativnih URL-ova.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob: data:; font-src 'self' data:; connect-src 'self' http://localhost:8080 http://localhost:11434 ws: wss:; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # ─── Hide nginx version header ─────────────────────────────────────────
    # Default Server header otkriva tacnu nginx verziju, sto napadacima daje target
    # za poznate CVE-e. server_tokens off skida verziju (ostavlja samo "nginx").
    # Globalno se setuje u nginx.conf na http nivou — ovde je u Dockerfile-u tako
    # postavljeno; ovo je dokumentacija da NE menjamo.

    # Arbitro AI chat (multipart audio/image upload — SSE streaming).
    # Eksplicitan location za /chat-multipart MORA biti pre generickog /chat
    # location-a inace longest-prefix match prevaja URL u /assistant/chat
    # (bez "-multipart") — BE vraca 404. Plus SSE config je isti (no buffering).
    location /api/assistant/chat-multipart {
        proxy_pass http://banka2_backend:8080/assistant/chat-multipart;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        # Multipart upload limit (audio Blob moze biti par MB)
        client_max_body_size 20m;
    }

    # Arbitro AI chat — SSE streaming (text/event-stream).
    # Mora se ISKLJUCITI buffering inace nginx ceka da ceo response stigne pa
    # tek onda emituje, sto kvari token-by-token UX. Plus dugacak timeout jer
    # CPU inference moze biti 100-180s.
    location /api/assistant/chat {
        proxy_pass http://banka2_backend:8080/assistant/chat;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Standard API proxy za sve ostale rute (sa default timeout-ima).
    # Ide na api-gateway (nginx reverse-proxy) koji path-rutira po prefiksu:
    # trgovinske rute (/orders, /portfolio, /listings, /exchanges, /funds, /tax,
    # /actuaries, /options, /margin-accounts, /otc, /profit-bank, /watchlists,
    # /price-alerts, /recurring-orders, /dividends, /admin/dividends) idu na
    # trading-service:8082; sve ostalo (banka-core: /accounts, /payments, /cards,
    # /loans, /clients, /employees, /interbank, /savings, /notifications, ...)
    # ide na backend:8080. Direktno usmeravanje na backend bi srusilo trgovinske
    # rute posle 2f cutover-a (paketi obrisani iz monolita).
    location /api/ {
        proxy_pass http://banka2_gateway/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hashirani asset-i (Vite dodaje content-hash u file name) — agresivno
    # kesh, jer se naziv menja kad se sadrzaj promeni.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # Re-add security headers unutar location-a — `add_header` u nginx-u
        # je override-ujuci (ne nasleduje sa server bloka kad ima local add_header).
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
    }

    # index.html NE sme da bude kesh-iran — hash-evi chunk-ova se menjaju
    # pri svakom build-u, browser MORA da povuce sveze pri svakom load-u.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Referrer-Policy "no-referrer" always;
        # Geolocation i microphone DOZVOLJENI za sami app (self) — geolocation za
    # "Najblize lokacije" na /branches mapi (Leaflet), microphone za Arbitro
    # voice input (Web Speech API + SpeechRecognition). Camera/payment/USB ostaju
    # disabled. interest-cohort opt-out (FLoC).
    add_header Permissions-Policy "geolocation=(self), microphone=(self), camera=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob: data:; font-src 'self' data:; connect-src 'self' http://localhost:8080 http://localhost:11434 ws: wss:; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" always;
        expires off;
    }

    # SPA fallback — sve frontend rute serviraju index.html (React Router).
    # Bez cache (nasleduje no-store iz index.html bloka iznad kad se serviraju).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Referrer-Policy "no-referrer" always;
        # Geolocation i microphone DOZVOLJENI za sami app (self) — geolocation za
    # "Najblize lokacije" na /branches mapi (Leaflet), microphone za Arbitro
    # voice input (Web Speech API + SpeechRecognition). Camera/payment/USB ostaju
    # disabled. interest-cohort opt-out (FLoC).
    add_header Permissions-Policy "geolocation=(self), microphone=(self), camera=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob: data:; font-src 'self' data:; connect-src 'self' http://localhost:8080 http://localhost:11434 ws: wss:; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" always;
        expires off;
    }
}
