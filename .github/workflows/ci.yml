name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  npm-audit:
    name: "npm audit (SAST: dep-vuln scan)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production deps for high+critical CVEs
        # SAST gate: build pada ako neki dep ima high ili critical CVE.
        # Production-only filter (`--omit=dev`) sprecava da ESLint/Vitest dev-deps
        # pucaju build kad imaju low-severity issues koji ne idu u runtime bundle.
        run: npm audit --audit-level=high --omit=dev

  eslint-security:
    name: "ESLint security plugin (SAST: code-pattern scan)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run eslint-plugin-security
        # `eslint-plugin-security` detektuje OWASP-style obrasce: eval(), unsafe regex
        # (ReDoS), child_process spawn sa korisnickim input-om, fs.readFile sa
        # nelitralnim path-om, weak crypto (`crypto.pseudoRandomBytes`), itd.
        # Pokrecemo samo nase src/ — bez node_modules.
        # CI-03: `continue-on-error` uklonjen (SAST gate je sad pravi gate).
        # `--rule` lista koristi ERROR level za "detect-*" pravila koja moraju da
        # padnu build; `detect-unsafe-regex` je WARN jer regex linting ima cesce
        # false positive-e (npr. validation patterns sa nestabilnim repetitionom).
        # Koristimo eksplicitan `eslint.config.security.mjs` config (umesto inline
        # `--rule` + `--no-config-lookup`) jer ESLint 10 sa `--no-config-lookup`
        # ima bug sa glob-ovima: "all of the files matching the glob pattern
        # 'src/' are ignored". Eksplicitan config sa `files: ['src/**/*.{ts,tsx,js,jsx}']`
        # resava problem. Vidi `eslint.config.security.mjs` za listu pravila.
        run: npx eslint --config eslint.config.security.mjs "src"

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  vitest:
    name: Vitest Unit Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run vitest sa coverage gate
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: vitest-coverage
          path: coverage/
          if-no-files-found: ignore

  cypress-mocked:
    name: Cypress E2E Tests (Mocked)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          build: npm run build
          start: npx serve -s dist -l 3000
          wait-on: "http://localhost:3000"
          wait-on-timeout: 120
          config: video=false
          # Spec liste su eksplicitno enumerirane (ne wildcard) da bi se
          # `arbitro-mock.cy.ts` (Arbitro AI asistent — opcioni Celina 6,
          # zahteva live Ollama+RAG+TTS sidecar-e koje GH runner nema)
          # uvek izostavio iz CI-a, bez obzira sto je u istom direktorijumu.
          spec: "cypress/e2e/celina1-mock.cy.ts,cypress/e2e/celina2-mock.cy.ts,cypress/e2e/celina3-mock.cy.ts,cypress/e2e/celina4-mock.cy.ts"

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: cypress-mocked-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

  cypress-live:
    name: Cypress E2E Tests (Live)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: banka2
          POSTGRES_USER: banka2user
          POSTGRES_PASSWORD: banka2pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U banka2user -d banka2"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      trading-postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: trading_db
          POSTGRES_USER: banka2user
          POSTGRES_PASSWORD: banka2pass
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U banka2user -d trading_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      notification-postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: notification_db
          POSTGRES_USER: banka2user
          POSTGRES_PASSWORD: banka2pass
        ports:
          - 5434:5432
        options: >-
          --health-cmd="pg_isready -U banka2user -d notification_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull backend images
        id: pull-backend
        continue-on-error: true
        # Race condition mitigation: ako se BE i FE push-uju u isto vreme (npr.
        # multi-repo runa), BE-CD job moze jos uvek da bude u toku kad FE-CI
        # pokusa da povuce sliku. U tom slucaju imamo schema drift (npr. BE
        # entity ima novu kolonu, ali GHCR :latest jos uvek upucuje na stariju
        # sliku bez kolone), pa seed.sql puca na missing column. Dajemo BE-CD-u
        # 60s da zavrsi push, pa povlacimo opet (force re-pull). Ako jos uvek
        # nije ready, run continues sa onom slikom koja je dostupna; seed step
        # ce reproducovati drift i prijaviti smisleni error.
        #
        # Mikroservisi prelaz (26.05.2026): pull i trading-service image jer
        # `listings` tabela vise nije u banka-core monolit DB-u — sad je u
        # odvojenom `trading_db` koji posluzuje `banka-2-trading-service`.
        # Bez trading-service-a Celina 3+4 live spec-ovi ne mogu da rade
        # (svi /securities, /orders/new?listingId=... testovi).
        run: |
          docker pull ghcr.io/raf-si-2025/banka-2-backend:latest
          docker pull ghcr.io/raf-si-2025/banka-2-trading-service:latest || echo "::warning::trading-service image nije dostupan"
          echo "Cekam jos 60s za potencijalno noviji BE-CD push..."
          sleep 60
          docker pull ghcr.io/raf-si-2025/banka-2-backend:latest || true
          docker pull ghcr.io/raf-si-2025/banka-2-trading-service:latest || true

      - name: Skip if backend image unavailable
        if: steps.pull-backend.outcome == 'failure'
        run: |
          echo "::warning::Backend Docker image not available (GHCR private). Skipping Live E2E."
          echo "To fix: make ghcr.io/raf-si-2025/banka-2-backend package public, or add a GHCR_PAT secret with read:packages scope."
          echo "SKIP_LIVE=true" >> $GITHUB_ENV

      - name: Start backend container
        if: env.SKIP_LIVE != 'true'
        run: |
          docker run -d --name backend --network host \
            -e SPRING_DATASOURCE_URL="jdbc:postgresql://127.0.0.1:5432/banka2" \
            -e SPRING_DATASOURCE_USERNAME="banka2user" \
            -e SPRING_DATASOURCE_PASSWORD="banka2pass" \
            -e SPRING_DATASOURCE_DRIVER_CLASS_NAME="org.postgresql.Driver" \
            -e SPRING_JPA_HIBERNATE_DDL_AUTO="update" \
            -e SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT="org.hibernate.dialect.PostgreSQLDialect" \
            -e SPRING_JPA_PROPERTIES_HIBERNATE_TYPE_PREFERRED_BOOLEAN_JDBC_TYPE="INTEGER" \
            -e JWT_SECRET="ci-secret-key-for-ci-only-do-not-use-in-prod" \
            -e SPRING_MAIL_HOST="localhost" \
            -e SPRING_MAIL_PORT="25" \
            -e SPRING_MAIL_USERNAME="ci@example.com" \
            -e SPRING_MAIL_PASSWORD="ci-dummy" \
            -e EXCHANGE_API_KEY="ci-dummy-key" \
            -e STOCK_API_KEYS="ci-key-1,ci-key-2,ci-key-3,ci-key-4" \
            -e AUTH_RATE_LIMIT_ENABLED="true" \
            -e AUTH_RATE_LIMIT_CAPACITY="100000" \
            ghcr.io/raf-si-2025/banka-2-backend:latest

      - name: Wait for backend to be ready
        if: env.SKIP_LIVE != 'true'
        run: |
          echo "Waiting for backend to start..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/swagger-ui.html > /dev/null 2>&1 || curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "Backend is ready!"
              exit 0
            fi
            echo "Attempt $i - waiting..."
            sleep 5
          done

          echo "Backend failed to start in time."
          docker logs backend || true
          exit 1

      - name: Start trading-service container (best-effort)
        id: start-trading
        if: env.SKIP_LIVE != 'true'
        continue-on-error: true
        # Mikroservisi prelaz: trading-service je odvojen Spring Boot proces sa
        # svojim PostgreSQL DB-om (port 5433 na host). Pokrece se na portu 8082
        # da ne sukobi sa banka-core (8080). Ako image nije pull-ovan ili boot
        # padne, dalji koraci (cypress3+4) ce biti skip-ovani sa warning-om;
        # cypress1+2 ne zavise od trading-service-a pa rade nezavisno.
        run: |
          # Provjeri da li je image pulled
          if ! docker image inspect ghcr.io/raf-si-2025/banka-2-trading-service:latest > /dev/null 2>&1; then
            echo "::warning::trading-service image nije dostupan — Celina 3+4 live spec-ovi ce biti skip-ovani."
            exit 1
          fi

          docker run -d --name trading-service --network host \
            -e SPRING_DATASOURCE_URL="jdbc:postgresql://127.0.0.1:5433/trading_db" \
            -e SPRING_DATASOURCE_USERNAME="banka2user" \
            -e SPRING_DATASOURCE_PASSWORD="banka2pass" \
            -e SPRING_DATASOURCE_DRIVER_CLASS_NAME="org.postgresql.Driver" \
            -e SPRING_JPA_HIBERNATE_DDL_AUTO="update" \
            -e SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT="org.hibernate.dialect.PostgreSQLDialect" \
            -e SPRING_JPA_PROPERTIES_HIBERNATE_TYPE_PREFERRED_BOOLEAN_JDBC_TYPE="INTEGER" \
            -e SERVER_PORT="8082" \
            -e BANKA_CORE_BASE_URL="http://127.0.0.1:8080" \
            -e JWT_SECRET="ci-secret-key-for-ci-only-do-not-use-in-prod" \
            -e EXCHANGE_API_KEY="ci-dummy-key" \
            -e STOCK_API_KEYS="ci-key-1,ci-key-2,ci-key-3,ci-key-4" \
            -e AUTH_RATE_LIMIT_ENABLED="true" \
            -e AUTH_RATE_LIMIT_CAPACITY="100000" \
            ghcr.io/raf-si-2025/banka-2-trading-service:latest

      - name: Wait for trading-service to be ready
        id: wait-trading
        if: env.SKIP_LIVE != 'true' && steps.start-trading.outcome == 'success'
        continue-on-error: true
        run: |
          echo "Waiting for trading-service na 8082..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8082/actuator/health > /dev/null 2>&1 || curl -sf http://localhost:8082/ > /dev/null 2>&1; then
              echo "trading-service je spreman!"
              exit 0
            fi
            echo "Pokusaj $i - cekam..."
            sleep 5
          done
          echo "::warning::trading-service nije startovao u predvidjenom roku — Celina 3+4 ce biti skip-ovani."
          docker logs trading-service | tail -50 || true
          exit 1

      - name: Mark TRADING_UP env
        if: env.SKIP_LIVE != 'true'
        run: |
          if [ "${{ steps.start-trading.outcome }}" = "success" ] && [ "${{ steps.wait-trading.outcome }}" = "success" ]; then
            echo "TRADING_UP=true" >> $GITHUB_ENV
            echo "trading-service je spreman — Celina 3+4 ce ici."
          else
            echo "TRADING_UP=false" >> $GITHUB_ENV
            echo "trading-service nije podignut — samo Celina 1+2 spec-ovi ce ici."
          fi

      - name: Seed database
        if: env.SKIP_LIVE != 'true'
        env:
          PGPASSWORD: banka2pass
        run: |
          git clone --depth 1 https://github.com/RAF-SI-2025/Banka-2-Backend.git /tmp/backend

          # Sacekaj da Hibernate kreira sve tabele (DDL_AUTO=update ih kreira pri prvom boot-u)
          echo "Cekam da Hibernate kreira sve tabele u banka_core_db..."
          TABLE_COUNT=0
          for i in $(seq 1 30); do
            TABLE_COUNT=$(psql -h 127.0.0.1 -p 5432 -U banka2user -d banka2 -t -A -c \
              "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public'" 2>/dev/null || echo "0")
            echo "Pokusaj $i: $TABLE_COUNT tabela kreirane (banka2)"
            if [ "$TABLE_COUNT" -ge 30 ]; then
              echo "Sve tabele kreirane (banka2)."
              break
            fi
            sleep 2
          done

          if [ "$TABLE_COUNT" -lt 30 ]; then
            echo "::error::Hibernate nije kreirao dovoljno tabela u banka2 ($TABLE_COUNT < 30)"
            docker logs backend | tail -50
            exit 1
          fi

          # Truncate sve tabele pre seed-a (backend je mozda vec ubacio neke default podatke)
          psql -h 127.0.0.1 -p 5432 -U banka2user -d banka2 -v ON_ERROR_STOP=1 -c \
            "DO \$\$ DECLARE r RECORD; BEGIN
              EXECUTE 'SET session_replication_role = replica';
              FOR r IN SELECT tablename FROM pg_tables WHERE schemaname = 'public' LOOP
                EXECUTE 'TRUNCATE TABLE ' || quote_ident(r.tablename) || ' RESTART IDENTITY CASCADE';
              END LOOP;
              EXECUTE 'SET session_replication_role = DEFAULT';
            END \$\$;"

          # Seed banka-core
          psql -h 127.0.0.1 -p 5432 -U banka2user -d banka2 -v ON_ERROR_STOP=1 -f /tmp/backend/seed.sql

          # Verifikuj banka-core seed
          EMP_COUNT=$(psql -h 127.0.0.1 -p 5432 -U banka2user -d banka2 -t -A -c "SELECT COUNT(*) FROM employees")
          CLIENT_COUNT=$(psql -h 127.0.0.1 -p 5432 -U banka2user -d banka2 -t -A -c "SELECT COUNT(*) FROM clients")
          echo "Banka-core seed verifikacija: employees=$EMP_COUNT, clients=$CLIENT_COUNT"
          if [ "$EMP_COUNT" -lt 3 ] || [ "$CLIENT_COUNT" -lt 3 ]; then
            echo "::error::Banka-core seed nije uspesno ubacen podatke"
            exit 1
          fi
          echo "Banka-core baza seed-ovana."

          # Seed trading-service ako je podignut
          if [ "$TRADING_UP" = "true" ]; then
            echo "Cekam da trading-service Hibernate kreira tabele u trading_db..."
            TRADING_TABLE_COUNT=0
            for i in $(seq 1 30); do
              TRADING_TABLE_COUNT=$(psql -h 127.0.0.1 -p 5433 -U banka2user -d trading_db -t -A -c \
                "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public'" 2>/dev/null || echo "0")
              echo "Pokusaj $i: $TRADING_TABLE_COUNT tabela kreirane (trading_db)"
              if [ "$TRADING_TABLE_COUNT" -ge 5 ]; then
                echo "Trading_db tabele kreirane."
                break
              fi
              sleep 2
            done

            if [ "$TRADING_TABLE_COUNT" -lt 5 ]; then
              echo "::warning::trading-service nije kreirao tabele u trading_db — preskacem trading seed"
              docker logs trading-service | tail -50 || true
              echo "TRADING_UP=false" >> $GITHUB_ENV
            else
              # Truncate trading_db tabele
              psql -h 127.0.0.1 -p 5433 -U banka2user -d trading_db -v ON_ERROR_STOP=1 -c \
                "DO \$\$ DECLARE r RECORD; BEGIN
                  EXECUTE 'SET session_replication_role = replica';
                  FOR r IN SELECT tablename FROM pg_tables WHERE schemaname = 'public' LOOP
                    EXECUTE 'TRUNCATE TABLE ' || quote_ident(r.tablename) || ' RESTART IDENTITY CASCADE';
                  END LOOP;
                  EXECUTE 'SET session_replication_role = DEFAULT';
                END \$\$;" || echo "::warning::trading_db truncate failed (mozda nema tabela)"

              # Seed trading_db (trading-seed.sql u root-u Banka-2-Backend repo-a)
              if [ -f /tmp/backend/trading-seed.sql ]; then
                psql -h 127.0.0.1 -p 5433 -U banka2user -d trading_db -v ON_ERROR_STOP=1 -f /tmp/backend/trading-seed.sql || {
                  echo "::warning::trading-seed.sql failed — Celina 3+4 mozda padaju"
                  echo "TRADING_UP=false" >> $GITHUB_ENV
                }
                LISTING_COUNT=$(psql -h 127.0.0.1 -p 5433 -U banka2user -d trading_db -t -A -c "SELECT COUNT(*) FROM listings" 2>/dev/null || echo "0")
                echo "Trading seed verifikacija: listings=$LISTING_COUNT"
                if [ "$LISTING_COUNT" -lt 5 ]; then
                  echo "::warning::Premalo listings ($LISTING_COUNT < 5) — Celina 3+4 mozda nemaju dovoljno podataka"
                fi
              else
                echo "::warning::trading-seed.sql ne postoji u repo-u"
                echo "TRADING_UP=false" >> $GITHUB_ENV
              fi
            fi
          fi

          # Restart backend da pokupi seed-ovane podatke (cache refresh)
          docker restart backend
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/swagger-ui.html > /dev/null 2>&1 || curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "Backend je restartovan i spreman posle seed-a."
              break
            fi
            sleep 2
          done

          # Restart trading-service ako je gore
          if [ "$TRADING_UP" = "true" ]; then
            docker restart trading-service || true
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8082/actuator/health > /dev/null 2>&1 || curl -sf http://localhost:8082/ > /dev/null 2>&1; then
                echo "trading-service je restartovan i spreman posle seed-a."
                break
              fi
              sleep 2
            done
          fi

      - name: Build frontend
        if: env.SKIP_LIVE != 'true'
        run: npm run build

      - name: Create CI nginx config
        if: env.SKIP_LIVE != 'true'
        run: |
          # Bypass api-gateway u CI: zamenjujemo direktan proxy ka banka2_gateway sa
          # path-based rutiranjem (kao sto api-gateway radi u prod). Trgovinske rute
          # idu na trading-service (8082), ostalo na banka-core (8080).
          # `banka2_backend` placeholder ostaje 127.0.0.1:8080 (chat-multipart i chat
          # eksplicitni location-i koji idu direkt na banka-core).
          sed 's|http://banka2_backend:8080/|http://127.0.0.1:8080/|g' nginx.conf > nginx.ci.conf

          # Zameni `proxy_pass http://banka2_gateway/;` blok sa path-rutiranjem.
          # Python skripta sigurnije nego sed za vise-line replacement.
          python3 << 'EOF'
          import re

          with open('nginx.ci.conf', 'r') as f:
              content = f.read()

          # Pronadji `location /api/` blok sa banka2_gateway proxy-jem
          old_block = re.search(
              r'location /api/ \{[^}]*proxy_pass http://banka2_gateway/;[^}]*\}',
              content,
              re.MULTILINE | re.DOTALL,
          )

          if old_block is None:
              print('WARNING: nije nadjen location /api/ blok sa banka2_gateway — provjeri nginx.conf strukturu')
              raise SystemExit(0)

          # Trgovinski prefix-ovi (vide api-gateway/nginx.conf u Banka-2-Backend)
          trading_prefixes = [
              '/orders', '/portfolio', '/tax', '/funds', '/actuaries',
              '/listings', '/exchanges', '/options', '/margin-accounts',
              '/otc', '/profit-bank', '/price-alerts', '/watchlists',
              '/recurring-orders', '/dividends',
          ]
          # Direktan path-based block (rewrite /api/<prefix>/... -> <prefix>/... na upstream)
          # Posto je `/api/` strip-ovan kroz `proxy_pass http://upstream/;` (trailing slash strip-uje match-ed prefix).
          new_blocks = []
          for prefix in trading_prefixes:
              new_blocks.append(f'''    location /api{prefix} {{
                  proxy_pass http://127.0.0.1:8082{prefix};
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }}''')
          # `/api/admin/dividends` ide na trading; ostali `/api/admin/*` (employees) ide na banka-core
          new_blocks.append('''    location /api/admin/dividends {
                  proxy_pass http://127.0.0.1:8082/admin/dividends;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }''')
          # Notification-service rute
          new_blocks.append('''    location /api/notifications {
                  proxy_pass http://127.0.0.1:8083/notifications;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }''')
          # Catch-all: sve ostalo (auth, accounts, cards, payments, transfers, loans,
          # clients, employees, interbank, savings, branches, games, assistant) ide na banka-core.
          new_blocks.append('''    location /api/ {
                  proxy_pass http://127.0.0.1:8080/;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }''')

          new_content = content.replace(old_block.group(0), '\n'.join(new_blocks))

          with open('nginx.ci.conf', 'w') as f:
              f.write(new_content)

          print('CI nginx config generated successfully sa direct path routing')
          EOF
          echo "----- nginx.ci.conf top 30 lines -----"
          head -30 nginx.ci.conf
          echo "----- nginx.ci.conf grep proxy_pass -----"
          grep -n "proxy_pass" nginx.ci.conf | head -30

      - name: Build frontend nginx image
        if: env.SKIP_LIVE != 'true'
        run: docker build -t banka2-frontend:ci-test .

      - name: Start frontend with nginx
        if: env.SKIP_LIVE != 'true'
        run: |
          docker run -d --name frontend --network host \
            -v "$(pwd)/nginx.ci.conf:/etc/nginx/conf.d/default.conf:ro" \
            banka2-frontend:ci-test
          sleep 3

      - name: Compute Cypress spec list
        if: env.SKIP_LIVE != 'true'
        id: cypress-specs
        run: |
          # Celina 1+2 (auth + bankarstvo) idu UVEK kroz banka-core monolit.
          # Celina 3+4 (berza, OTC, fondovi) zahtevaju trading-service kontejner —
          # pokrecu se SAMO ako je TRADING_UP=true. Inace skipujemo da CI ne pada
          # dok god nije postavljen trading-service image setup.
          if [ "$TRADING_UP" = "true" ]; then
            echo "SPECS=cypress/e2e/celina1-live.cy.ts,cypress/e2e/celina2-live.cy.ts,cypress/e2e/celina3-live.cy.ts,cypress/e2e/celina4-live.cy.ts" >> $GITHUB_OUTPUT
            echo "Cypress Live: pokrecu se Celina 1-4 (trading-service je gore)."
          else
            echo "SPECS=cypress/e2e/celina1-live.cy.ts,cypress/e2e/celina2-live.cy.ts" >> $GITHUB_OUTPUT
            echo "::warning::Cypress Live: pokrecu se SAMO Celina 1+2 (trading-service nije dostupan)."
          fi

      - name: Run Cypress live tests
        if: env.SKIP_LIVE != 'true'
        uses: cypress-io/github-action@v6
        with:
          install: false
          wait-on: "http://localhost"
          wait-on-timeout: 60
          config: video=false,baseUrl=http://localhost
          # `arbitro-live.cy.ts` se izostavlja jer trazi Ollama + RAG + TTS sidecar-e
          # koji nisu dostupni u CI-u (samo lokalno).
          # Spec lista se racuna dinamicki — Celina 3+4 zahtevaju trading-service.
          spec: ${{ steps.cypress-specs.outputs.SPECS }}

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: cypress-live-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Show backend logs on failure
        if: failure()
        run: docker logs backend || true

      - name: Show frontend logs on failure
        if: failure()
        run: docker logs frontend || true

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t banka2-frontend:ci-test .
